name: Notify download completions

on:
  schedule:
    # Every 2 minutes
    - cron: "*/2 * * * *"
  workflow_dispatch:

concurrency:
  group: notify-completions
  cancel-in-progress: true

jobs:
  notify:
    name: Check completions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve APP_URL and notify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          account_id = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          cf_token = os.environ["CLOUDFLARE_API_TOKEN"]
          cron_secret = os.environ["CRON_SECRET"]
          worker_name = "tg-dl"

          req = urllib.request.Request(
              f"https://api.cloudflare.com/client/v4/accounts/{account_id}/workers/subdomain",
              headers={"Authorization": f"Bearer {cf_token}"},
          )
          with urllib.request.urlopen(req) as res:
              data = json.load(res)

          subdomain = (data.get("result") or {}).get("subdomain")
          if not subdomain:
              raise SystemExit(f"Failed to resolve workers.dev subdomain: {data}")

          app_url = f"https://{worker_name}.{subdomain}.workers.dev"
          endpoint = f"{app_url}/api/cron/completions"
          print(f"Calling {endpoint}")

          notify_req = urllib.request.Request(
              endpoint,
              data=b"{}",
              headers={
                  "Authorization": f"Bearer {cron_secret}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(notify_req) as res:
                  print(res.read().decode())
          except urllib.error.HTTPError as err:
              body = err.read().decode()
              raise SystemExit(f"Notify failed ({err.code}): {body}") from err
          PY
