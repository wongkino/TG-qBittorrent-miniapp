name: Notify download completions

on:
  schedule:
    # Every 2 minutes
    - cron: "*/2 * * * *"
  workflow_dispatch:

concurrency:
  group: notify-completions
  cancel-in-progress: true

jobs:
  notify:
    name: Check completions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call completions endpoint
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          python3 <<'PY'
          import os
          import sys
          import urllib.error
          import urllib.request

          app_url = os.environ.get("APP_URL", "").strip().rstrip("/")
          cron_secret = os.environ.get("CRON_SECRET", "").strip()
          if not app_url:
              print(
                  "Missing GitHub Actions variable APP_URL "
                  "(e.g. https://tg-dl.<subdomain>.workers.dev)",
                  file=sys.stderr,
              )
              sys.exit(1)
          if not cron_secret:
              print("Missing secret CRON_SECRET", file=sys.stderr)
              sys.exit(1)

          endpoint = f"{app_url}/api/cron/completions"
          print(f"Calling {endpoint}")

          notify_req = urllib.request.Request(
              endpoint,
              data=b"{}",
              headers={
                  "Authorization": f"Bearer {cron_secret}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(notify_req) as res:
                  print(res.read().decode())
          except urllib.error.HTTPError as err:
              body = err.read().decode()
              raise SystemExit(f"Notify failed ({err.code}): {body}") from err
          PY
