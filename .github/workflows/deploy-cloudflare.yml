name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure USER_PREFS KV namespace
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python3 <<'PY'
          import json
          import pathlib
          import re
          import subprocess
          import sys

          TITLE = "tg-dl-user-prefs"
          PLACEHOLDER = "PLACEHOLDER_USER_PREFS_KV_ID"

          def run(args: list[str]) -> str:
              return subprocess.check_output(args, text=True)

          raw = run(["npx", "wrangler", "kv", "namespace", "list", "--json"])
          namespaces = json.loads(raw)
          ns = next((item for item in namespaces if item.get("title") == TITLE), None)
          if ns is None:
              created = run(
                  ["npx", "wrangler", "kv", "namespace", "create", TITLE, "--json"]
              )
              # wrangler may print logs before JSON
              match = re.search(r"\{[\s\S]*\}", created.strip())
              if not match:
                  print("Failed to parse KV create output:", created, file=sys.stderr)
                  sys.exit(1)
              ns = json.loads(match.group(0))

          kv_id = ns.get("id")
          if not kv_id:
              print("KV namespace id missing:", ns, file=sys.stderr)
              sys.exit(1)

          path = pathlib.Path("wrangler.jsonc")
          text = path.read_text(encoding="utf-8")
          if PLACEHOLDER not in text and kv_id not in text:
              print("wrangler.jsonc missing USER_PREFS placeholder/id", file=sys.stderr)
              sys.exit(1)
          path.write_text(text.replace(PLACEHOLDER, kv_id), encoding="utf-8")
          print(f"USER_PREFS KV id={kv_id}")
          PY

      - name: Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}

      - name: Sync Worker secrets from GitHub
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          QBITTORRENT_USERNAME: ${{ secrets.QBITTORRENT_USERNAME }}
          QBITTORRENT_PASSWORD: ${{ secrets.QBITTORRENT_PASSWORD }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          ALLOWED_GOOGLE_EMAILS: ${{ vars.ALLOWED_GOOGLE_EMAILS }}
          ALLOWED_TELEGRAM_USER_IDS: ${{ vars.ALLOWED_TELEGRAM_USER_IDS }}
          QBITTORRENT_URL: ${{ vars.QBITTORRENT_URL }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys

          keys = [
              "TELEGRAM_BOT_TOKEN",
              "ALLOWED_TELEGRAM_USER_IDS",
              "QBITTORRENT_URL",
              "QBITTORRENT_USERNAME",
              "QBITTORRENT_PASSWORD",
              "CRON_SECRET",
          ]
          optional_keys = ["GOOGLE_CLIENT_ID", "ALLOWED_GOOGLE_EMAILS"]
          missing = [k for k in keys if not os.environ.get(k, "").strip()]
          if missing:
              print(
                  "Missing required GitHub Actions secrets/vars: "
                  + ", ".join(missing),
                  file=sys.stderr,
              )
              sys.exit(1)

          payload = {k: os.environ[k] for k in keys}
          for key in optional_keys:
              value = os.environ.get(key, "").strip()
              if value:
                  payload[key] = value

          with open("worker-secrets.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          PY
          npx wrangler secret bulk worker-secrets.json
          rm -f worker-secrets.json

      - name: Set Telegram webhook and menu button
        env:
          APP_URL: ${{ vars.APP_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          app_url = os.environ.get("APP_URL", "").strip().rstrip("/")
          if not app_url:
              print(
                  "Missing GitHub Actions variable APP_URL "
                  "(e.g. https://tg-dl.<subdomain>.workers.dev)",
                  file=sys.stderr,
              )
              sys.exit(1)

          def call(method: str, payload: dict) -> None:
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/{method}",
                  data=json.dumps(payload).encode(),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req) as res:
                  print(f"{method}: {res.read().decode()}")

          call(
              "setWebhook",
              {
                  "url": f"{app_url}/api/telegram/webhook",
                  "secret_token": os.environ["CRON_SECRET"],
                  "allowed_updates": ["message"],
                  "drop_pending_updates": False,
              },
          )
          # Input-field left menu button → opens Mini App
          call(
              "setChatMenuButton",
              {
                  "menu_button": {
                      "type": "web_app",
                      "text": "開啟 App",
                      "web_app": {"url": app_url},
                  }
              },
          )
          PY
