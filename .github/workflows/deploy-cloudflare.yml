name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync Worker secrets from GitHub
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          QBITTORRENT_USERNAME: ${{ secrets.QBITTORRENT_USERNAME }}
          QBITTORRENT_PASSWORD: ${{ secrets.QBITTORRENT_PASSWORD }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ALLOWED_TELEGRAM_USER_IDS: ${{ vars.ALLOWED_TELEGRAM_USER_IDS }}
          QBITTORRENT_URL: ${{ vars.QBITTORRENT_URL }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys

          keys = [
              "TELEGRAM_BOT_TOKEN",
              "ALLOWED_TELEGRAM_USER_IDS",
              "QBITTORRENT_URL",
              "QBITTORRENT_USERNAME",
              "QBITTORRENT_PASSWORD",
              "CRON_SECRET",
          ]
          missing = [k for k in keys if not os.environ.get(k, "").strip()]
          if missing:
              print(
                  "Missing required GitHub Actions secrets/vars: "
                  + ", ".join(missing),
                  file=sys.stderr,
              )
              sys.exit(1)

          with open("worker-secrets.json", "w", encoding="utf-8") as f:
              json.dump({k: os.environ[k] for k in keys}, f)
          PY
          npx wrangler secret bulk worker-secrets.json
          rm -f worker-secrets.json

      - name: Resolve APP_URL and set Telegram webhook
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request

          account_id = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          cf_token = os.environ["CLOUDFLARE_API_TOKEN"]
          worker_name = "tg-dl"

          req = urllib.request.Request(
              f"https://api.cloudflare.com/client/v4/accounts/{account_id}/workers/subdomain",
              headers={"Authorization": f"Bearer {cf_token}"},
          )
          with urllib.request.urlopen(req) as res:
              data = json.load(res)

          subdomain = (data.get("result") or {}).get("subdomain")
          if not subdomain:
              raise SystemExit(f"Failed to resolve workers.dev subdomain: {data}")

          app_url = f"https://{worker_name}.{subdomain}.workers.dev"
          print(f"Resolved APP_URL={app_url}")

          payload = {
              "url": f"{app_url}/api/telegram/webhook",
              "secret_token": os.environ["CRON_SECRET"],
              "allowed_updates": ["message"],
              "drop_pending_updates": False,
          }
          hook_req = urllib.request.Request(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/setWebhook",
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(hook_req) as res:
              print(res.read().decode())
          PY
